name: Build Tests

on:
  pull_request:
    branches: [dev, master, main]
  workflow_dispatch:

jobs:
  build:
    uses: OpenVoiceOS/gh-automations/.github/workflows/build-tests.yml@dev
    secrets: inherit
    with:
      python_versions: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
      install_extras: 'test'
      test_path: 'tests'
      pr_comment: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      # NOTE: intentionally no pre_install_pip pin to the unreleased
      # hivemind-plugin-manager policy-plugins branch. The plugin is
      # designed to tolerate older HPM gracefully (migrate() guards on
      # getattr(AbstractDB, "SCHEMA_VERSION", 1) and skips when the
      # constant is missing). Running CI against the PyPI HPM exercises
      # exactly the partial-upgrade path operators may hit when they
      # upgrade this plugin before HPM. If CI breaks here, the
      # back-compat contract has regressed.
