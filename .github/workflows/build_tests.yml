name: Run Build Tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build_tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip build wheel
      - name: Build Distribution Packages
        run: |
          python -m build --wheel
      - name: Install package
        run: |
          pip install .
      - name: Import package
        run: |
          python -c "import hivemind_redis_database"
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p 'test_redisdb.py' -v

  integration_tests:
    name: Integration Tests
    needs: build_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Redis Stack Integration
        run: |
          docker run -d --name redis-stack-test -p 6380:6379 redis/redis-stack-server@sha256:798ab84d9f266936b034ab11c4d04a2b8e4b441884c5aa7d17ac951eefdf742a
          REDIS_TEST_MODE=single \
          REDIS_HOST=127.0.0.1 \
          REDIS_PORT=6380 \
          REDIS_EXPECT_REDISEARCH=1 \
          python -m unittest discover -s tests -p 'test_integration.py' -v
      - name: Generate TLS Certificates
        run: |
          set -euo pipefail
          TLS_DIR="$RUNNER_TEMP/redis-tls"
          mkdir -p "$TLS_DIR"
          cat > "$TLS_DIR/ca.cnf" <<'EOF'
          [ req ]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn
          x509_extensions = v3_ca
          [ dn ]
          CN = codex-ci-ca
          [ v3_ca ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer
          basicConstraints = critical, CA:true
          keyUsage = critical, digitalSignature, cRLSign, keyCertSign
          EOF
          openssl req -x509 -new -nodes -days 365 -config "$TLS_DIR/ca.cnf" -keyout "$TLS_DIR/ca.key" -out "$TLS_DIR/ca.crt"
          cat > "$TLS_DIR/server.cnf" <<'EOF'
          [ req ]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn
          req_extensions = req_ext
          [ dn ]
          CN = localhost
          [ req_ext ]
          subjectAltName = @alt_names
          [ alt_names ]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          EOF
          openssl req -new -nodes -config "$TLS_DIR/server.cnf" -keyout "$TLS_DIR/server.key" -out "$TLS_DIR/server.csr"
          cat > "$TLS_DIR/server-ext.cnf" <<'EOF'
          authorityKeyIdentifier=keyid,issuer
          basicConstraints=CA:FALSE
          keyUsage = digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names
          [alt_names]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          EOF
          openssl x509 -req -in "$TLS_DIR/server.csr" -CA "$TLS_DIR/ca.crt" -CAkey "$TLS_DIR/ca.key" -CAcreateserial -out "$TLS_DIR/server.crt" -days 365 -sha256 -extfile "$TLS_DIR/server-ext.cnf"
      - name: Redis TLS Integration
        run: |
          set -euo pipefail
          TLS_DIR="$RUNNER_TEMP/redis-tls"
          docker create --name redis-tls-test -p 6381:6379 -e REDIS_PASSWORD=codextls redis:7.2.5-alpine sh -c 'exec redis-server --bind 0.0.0.0 --port 0 --tls-port 6379 --tls-cert-file /tls/server.crt --tls-key-file /tls/server.key --tls-ca-cert-file /tls/ca.crt --tls-auth-clients no --protected-mode no --requirepass "$REDIS_PASSWORD" --appendonly no --save ""'
          docker cp "$TLS_DIR"/. redis-tls-test:/tls
          docker start redis-tls-test
          REDIS_TEST_MODE=tls \
          REDIS_HOST=localhost \
          REDIS_PORT=6381 \
          REDIS_PASSWORD=codextls \
          REDIS_CA_CERT="$TLS_DIR/ca.crt" \
          REDIS_USE_SSL=1 \
          python -m unittest discover -s tests -p 'test_integration.py' -v
      - name: Redis Cluster Integration
        run: |
          docker run -d --name redis-cluster-test -p 7000-7005:7000-7005 grokzen/redis-cluster:7.0.15
          REDIS_TEST_MODE=cluster \
          REDIS_HOST=127.0.0.1 \
          REDIS_PORT=7000 \
          python -m unittest discover -s tests -p 'test_integration.py' -v
      - name: Cleanup Integration Containers
        if: always()
        run: |
          docker rm -f redis-stack-test redis-tls-test redis-cluster-test || true
